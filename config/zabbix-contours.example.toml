# Пресеты контуров Zabbix — «имя контура → полный охват съёма» (ЛОКАЛИЗАЦИЯ).
# Скопируй в config/zabbix-contours.toml (или укажи env ZABBIX_CONTOURS_CONFIG) и заполни
# под свои контуры. Токен сюда НЕ писать — только env ZABBIX_TOKEN (персональный, read-only).
#
# Зачем: методика 1c-expert требует полного охвата (ВСЕ дашборды контура + все хосты + окно 24ч
# + лимит ядер лицензии). Пресет делает это одним словом: zabbix_perf.py --contour kz —
# и «до/после» гарантированно сравниваются тем же охватом.

[kz]                                          # имя = как контур называют в команде
url = "http://zbx.example/api_jsonrpc.php"    # можно опустить, если задан env ZABBIX_URL
dashboards = "408,410"                        # ВСЕ дашборды контура: app-сервер + СУБД, через запятую
hosts = "vc-1c-*"                             # маска ВСЕХ хостов контура (или список ["a", "b"])
window_hours = 24                             # окно по умолчанию — сутки (не час!)
licensed_cores = { "vc-1c-app-01" = 12 }      # лимит ядер лицензии 1С (ПРОФ = 12 на рабочий сервер)
storage_map_base = "AskonaKZ_ERP"             # карта структуры хранения (scripts/storage_map.py status)
onec_profile = "kz"                           # профиль onec-code: корреляция SQL-улик с кодом контура
# notes = "особенности контура — попадут в контекст анализа"

# [by]
# dashboards = "…"
# hosts = "…"
