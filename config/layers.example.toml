# Конфиг слоёв onec-code — НЕОБЯЗАТЕЛЬНЫЙ. Управляет тем, как репозитории в ONEC_SRC_DIR
# группируются в слои, как тегируются в выводе и какие scope-группы доступны в search_1c/find_object.
#
# Без этого файла (или с пустым) поведение = чистое auto-discovery: каждый найденный слой
# тегируется именем своего репозитория [<repo>], все слои в одной группе "all", scope по умолчанию "all".
#
# Путь к файлу задаётся переменной ONEC_LAYERS_CONFIG (в docker-compose уже проброшен).
# Локализация (напр. под конкретную компанию) = СВОЯ копия этого файла, код менять не нужно.
#
# Ниже — generic-дефолт + примеры локализации в комментариях.

[options]
# Репозитории-исключения (по имени каталога в ONEC_SRC_DIR) — не подхватывать.
ignore = ["sandbox"]
# scope по умолчанию, если в search_1c/find_object не передан явно. Должен существовать в [scopes].
default_scope = "all"

# --- Классификация авто-найденных слоёв по имени репозитория (правила сверху вниз, первое совпадение) ---
# role  — произвольная метка роли (попадает в scope-группы ниже).
# tag   — префикс ярлыка: слой выводится как [<tag>:<repo>]. Если tag не задан — просто [<repo>].
# Без правил всё попадает в [classify_default].
#
# Пример локализации (раскомментировать и подставить свои контуры):
# [[classify]]
# glob = "*-baseline"
# role = "baseline"
# tag  = "конфиг"
#
# [[classify]]
# regex = "^[A-Za-z0-9]+-(core|country)-"
# role  = "baseline"
# tag   = "конфиг"
#
# Подсказка: если расширения именуются с маркером (напр. "-ext-"), поставь правило для них ВЫШЕ правила
# базовых конфигураций — иначе оно ошибочно заберёт расширение в baseline (правила идут сверху вниз, первое совпадение).

[classify_default]
# Куда отнести слой, не совпавший ни с одним правилом [[classify]].
role = "layer"
# tag не задан → ярлык будет просто [<repo>].

# --- Явные «приколотые» слои с фиксированным ярлыком (относительный путь от ONEC_SRC_DIR) ---
# Для слоёв, которым нужен особый человекочитаемый ярлык вместо имени репо.
# Пример локализации:
# [[pin]]
# path  = "<repo-базовой-конфигурации>/src/<имя>/src"
# label = "типовая"
# role  = "baseline"
#
# [[pin]]
# path  = "<repo-расширения>/src/<имя>/src"
# label = "расширение"
# role  = "extension"

# --- scope-группы: имя -> список ролей, которые в неё входят ---
# Эти имена допустимы как аргумент scope в search_1c/find_object.
[scopes]
all = ["layer", "baseline", "extension"]
# Пример локализации:
# baseline  = ["baseline"]
# extension = ["extension"]
# both      = ["baseline", "extension"]

# --- Режимы/профили: ограничить активный набор репозиториев (выбор через ONEC_PROFILE) ---
# Полезно, когда один центр обслуживает разные раскладки/контуры. Без ONEC_PROFILE активны все слои.
# Пример локализации:
# [profiles.контур-a]
# include = ["<repo-конфигурации-a>", "<repo-общего-расширения>"]
#
# [profiles.контур-b]
# include = ["<repo-конфигурации-b>", "<repo-общего-расширения>"]
