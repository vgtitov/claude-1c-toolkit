# Центральный onec-code MCP по HTTP за авторизацией.
# onec-code читает код 1С и отдаёт MCP по SSE ТОЛЬКО во внутреннюю сеть; наружу торчит Caddy с bearer-токеном.
# ONEC_SRC_DIR — каталог с клонами конфигураций/расширений 1С (на хосте), монтируется read-only.
# ONEC_BEARER_TOKEN — общий секрет; клиент шлёт его в заголовке Authorization. Задаётся в .env (см. .env.example).
services:
  onec-code:
    # Файлы стека живут в server/, но контекст сборки — КОРЕНЬ репо: Dockerfile делает COPY mcp/onec_mcp.py.
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: claude-1c-toolkit/onec-code:latest
    expose:
      - "8000"            # только внутренняя сеть compose, на хост не публикуется
    volumes:
      # Пути относительны каталога compose (server/). ONEC_SRC_DIR обычно задают абсолютным в .env.
      - "${ONEC_SRC_DIR:-../src}:/src:ro"
      # Необязательный конфиг слоёв/scope/режимов (см. ../config/layers.example.toml). Нет файла — чистое auto-discovery.
      - "${ONEC_LAYERS_CONFIG:-../config/layers.example.toml}:/app/layers.toml:ro"
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      ONEC_LAYERS_CONFIG: /app/layers.toml
      ONEC_PROFILE: "${ONEC_PROFILE:-}"
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    depends_on:
      - onec-code
    ports:
      - "${ONEC_PUBLIC_PORT:-8000}:8000"
    volumes:
      - "./caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
    environment:
      ONEC_BEARER_TOKEN: "${ONEC_BEARER_TOKEN:?задай ONEC_BEARER_TOKEN в .env — без него сервис не поднять}"
    restart: unless-stopped
