name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        # Зависимости движка/тестов: lxml (правки XML метаданных), openpyxl/xlrd (storage_map), mcp, pytest.
        run: uv run --no-project --with mcp --with pytest --with lxml --with openpyxl --with xlrd pytest tests/ -q
